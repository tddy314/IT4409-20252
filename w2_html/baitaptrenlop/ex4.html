<!DOCTYPE html>
<html lang="vi">
<head>
    <meta content="Exercise 4" charset="UTF-8">
    <title>Facebook - Đăng ký</title>
</head>
<body>
    <h1>facebook</h1>
    <h2>Tạo tài khoản mới</h2>
    <p>Nhanh chóng và dễ dàng.</p>
    <form>
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label>Họ:</label><br>
            <input type="text" name="ho"><br><br>
            <label>Tên:</label><br>
            <input type="text" name="ten"><br><br>
            <label>Số di động hoặc email:</label><br>
            <input type="text" name="email"><br><br>
            <label>Mật khẩu:</label><br>
            <input type="password" name="password"><br><br>
            <label>Ngày sinh:</label><br>
            <select name="ngay">
                <option>Ngày</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
            </select>
            <select name="thang">
                <option>Tháng</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
            </select>
            <select name="nam">
                <option>Năm</option>
                <option>2005</option>
                <option>2006</option>
                <option>2007</option>
            </select>
            <br><br>
            <label>Giới tính:</label><br>
            <input type="radio" name="gender" value="nam"> Nam<br>
            <input type="radio" name="gender" value="nu"> Nữ<br>
            <input type="radio" name="gender" value="khac"> Khác<br><br>
            <input type="submit" value="Đăng ký">
        </fieldset>
    </form>
    <p>Đã có tài khoản? <a href="#">Đăng nhập</a></p>
</body>
</html>
